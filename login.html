</head>
<body>

    <h1 class="text-3xl text-center mt-12">Welcome to DOM

              <p class="font-medium mb-4">Please login</p>
              <input type="text" id="loginemail" class="block w-1/2 mx-auto p-2 mb-4" placeholder ="Enter your email">
              <input type="password" id="loginpass"  class="block w-1/2 mx-auto p-2 mb-4" placeholder ="Enter your password">
              <button id="loginbutton" import {  } from 'login'; class="inline-block text-2xl bg-red-400 px-3 py-2 text-white rounded hover:bg-red-500 ">login</button>
          </div>
        </section>





    <script src="https://cdn.tailwindcss.com"></script>
